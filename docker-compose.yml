services:
  postgres:
    image: postgres:16-alpine
    container_name: wormarket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wormarket
      POSTGRES_USER: wormarket
      POSTGRES_PASSWORD: wormarket
    ports:
      - '5432:5432'
    volumes:
      - wormarket_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wormarket -d wormarket']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  wormarket_postgres_data:

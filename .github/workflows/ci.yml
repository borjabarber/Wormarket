name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality and database checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wormarket
          POSTGRES_PASSWORD: wormarket
          POSTGRES_USER: wormarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wormarket -d wormarket"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      NODE_ENV: test
      DATABASE_URL: postgresql://wormarket:wormarket@localhost:5432/wormarket
      DIRECT_URL: postgresql://wormarket:wormarket@localhost:5432/wormarket
      FRONTEND_URL: http://localhost:3000
      JWT_ACCESS_SECRET: ci-access-secret-for-wormarket-only
      JWT_REFRESH_SECRET: ci-refresh-secret-for-wormarket-only
      LOCAL_UPLOAD_PATH: uploads-ci
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_REALTIME_MODE: polling
      STORAGE_DRIVER: local

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply database migrations
        run: npm run db:migrate:deploy

      - name: Seed demo data
        run: npm run db:seed

      - name: Check formatting
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Audit high and critical vulnerabilities
        run: npm audit --audit-level=high
